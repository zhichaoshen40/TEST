# 周报检索工作流：每周一 01:00 UTC 自动执行。
# 收邮件方式：使用 GitHub 自带通知。请到 GitHub 网页：
#   Settings → Notifications → Actions → 勾选 Email，即可在每次运行完成后收到 GitHub 发出的邮件。
name: Weekly Academic Paper Search

on:
  schedule:
    # 每周一 01:00 UTC
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests

      - name: Run search script
        id: search
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python search_papers.py

      - name: Upload Downloaded PDFs and weekly_paper_info
        uses: actions/upload-artifact@v4
        with:
          name: weekly-papers-and-info
          path: |
            downloads/**/*.pdf
            downloads/*/weekly_paper_info.md
          if-no-files-found: ignore
